<!doctype html>
<html lang="da">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}StudioFlow{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="{{ url_for('dashboard') }}">
            <span class="brand-mark">SF</span>
            <span>
                <strong>StudioFlow</strong>
                <small>{{ studio_name }}</small>
            </span>
        </a>
        <nav class="nav">
            <a href="{{ url_for('dashboard') }}">Dashboard</a>
            <a href="{{ url_for('new_session') }}">Opret session</a>
            <a href="{{ url_for('customers') }}">Kunder</a>
            <a href="{{ url_for('settings') }}">Indstillinger</a>
        </nav>
    </header>

    <main class="page">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="messages">
                    {% for category, message in messages %}
                        <div class="message {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
